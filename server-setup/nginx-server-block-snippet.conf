# ============================================================
#  Voeg dit toe aan je bestaande server { } block in Nginx
#  Locatie: doorgaans /etc/nginx/sites-available/belastinghulpzaanstad.nl
#  Daarna: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 443 ssl http2;
    server_name belastinghulpzaanstad.nl www.belastinghulpzaanstad.nl;

    # ── Rate limiting (vereist dat rate-limit.conf geladen is) ──
    limit_req  zone=general burst=40 nodelay;
    limit_conn conn_per_ip 20;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=()" always;

    # ── Blokkeer veelvoorkomende scanners ────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|sh|sql|bak|zip|tar|gz)$ {
        return 404;
    }

    location = /robots.txt  { access_log off; log_not_found off; }
    location = /favicon.ico { access_log off; log_not_found off; }

    # ── Stricter rate limit voor contact/formulieren ─────────
    # (pas het pad aan als je een contactformulier hebt)
    # location /contact {
    #     limit_req zone=strict burst=5 nodelay;
    # }

    # ── Rest van je bestaande config ─────────────────────────
    root /var/www/belastinghulpzaanstad.nl;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # SSL — waarschijnlijk al ingesteld via Certbot
    # ssl_certificate     /etc/letsencrypt/live/belastinghulpzaanstad.nl/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/belastinghulpzaanstad.nl/privkey.pem;
}
